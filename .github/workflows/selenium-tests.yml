name: Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:        # enables the Run workflow button in GitHub Actions UI
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'smoke'
        type: choice
        options: [ smoke, regression, full ]

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    services:
      # x86-64 Chrome grid — GitHub Actions runners are AMD64 (not ARM)
      selenium:
        image: selenium/standalone-chrome:4.21.0
        options: --shm-size="2g"
        ports:
          - 4444:4444

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Inject real credentials from GitHub Secrets into config.properties
      - name: Create config.properties from secrets
        run: |
          sed 's/YOUR_EMAIL_HERE/${{ secrets.APP_EMAIL }}/;
               s/YOUR_PASSWORD_HERE/${{ secrets.APP_PASSWORD }}/' \
            src/test/resources/config.properties.template \
            > src/test/resources/config.properties

      # Inject real credentials from GitHub Secrets into auth-data.json
      - name: Inject credentials into auth-data.json
        run: |
          sed -i 's/YOUR_EMAIL_HERE/${{ secrets.APP_EMAIL }}/;
                  s/YOUR_PASSWORD_HERE/${{ secrets.APP_PASSWORD }}/' \
            src/test/resources/testdata/auth-data.json

      - name: Run smoke tests
        env:
          SELENIUM_REMOTE_URL: http://localhost:4444/wd/hub
        run: mvn test -Dsuite=${{ github.event.inputs.suite || 'smoke' }} -Dbrowser=chrome --no-transfer-progress

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-screenshots
          path: target/screenshots/
