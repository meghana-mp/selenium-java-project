  <rect x="350" y="908" width="260" height="44" rx="6" fill="#fff" stroke="#64748B" stroke-width="1.5"/>
  <text x="480" y="926" text-anchor="middle" fill="#1F2937" font-size="11" font-weight="bold">@DataProvider</text>
  <text x="480" y="942" text-anchor="middle" fill="#6B7280" font-size="10">reads JSON testdata (booking, auth, event, payment)</text>

  <line x1="480" y1="952" x2="480" y2="972" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- S8 -->
  <rect x="350" y="974" width="260" height="44" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="480" y="992" text-anchor="middle" fill="#1565C0" font-size="11" font-weight="bold">Test Method</text>
  <text x="480" y="1008" text-anchor="middle" fill="#1565C0" font-size="10">Allure.step() annotations — retry re-enters here</text>

  <line x1="480" y1="1018" x2="480" y2="1038" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- S9 -->
  <rect x="350" y="1040" width="260" height="44" rx="6" fill="#fff" stroke="#64748B" stroke-width="1.5"/>
  <text x="480" y="1058" text-anchor="middle" fill="#1F2937" font-size="11" font-weight="bold">Page Object Method</text>
  <text x="480" y="1074" text-anchor="middle" fill="#6B7280" font-size="10">EventsPage · EventDetailPage · BookingPage …</text>

  <line x1="480" y1="1084" x2="480" y2="1104" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── SELF-HEALING SECTION ── -->
  <rect x="50" y="1106" width="860" height="230" rx="8" fill="#F3E8FF" stroke="#9333EA" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="480" y="1122" text-anchor="middle" fill="#7C3AED" font-size="10" font-weight="bold" letter-spacing="1">SELF-HEALING LOCATOR CASCADE</text>

  <!-- H1 diamond -->
  <polygon points="280,1136 400,1170 280,1204 160,1170" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="280" y="1166" text-anchor="middle" fill="#4C1D95" font-size="10" font-weight="bold">Primary locator</text>
  <text x="280" y="1180" text-anchor="middle" fill="#4C1D95" font-size="10">found?</text>

  <!-- H1 yes → right to S10 -->
  <path d="M 400 1170 H 500" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="452" y="1162" text-anchor="middle" fill="#16A34A" font-size="10" font-weight="bold">yes</text>

  <!-- H1 no → down to H2 -->
  <path d="M 280 1204 V 1240" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="292" y="1226" fill="#DC2626" font-size="10" font-weight="bold">no</text>

  <!-- H2 -->
  <rect x="150" y="1242" width="260" height="44" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="280" y="1260" text-anchor="middle" fill="#4C1D95" font-size="11" font-weight="bold">Static fallback locators</text>
  <text x="280" y="1276" text-anchor="middle" fill="#6D28D9" font-size="10">2 alternative By locators tried in order</text>

  <!-- H2 found → right to S10 -->
  <path d="M 410 1264 H 500" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="458" y="1256" text-anchor="middle" fill="#16A34A" font-size="10" font-weight="bold">found</text>

  <!-- H2 all fail → down to H3 -->
  <path d="M 280 1286 V 1316" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="296" y="1306" fill="#DC2626" font-size="10" font-weight="bold">all fail</text>

  <!-- H3 -->
  <rect x="130" y="1318" width="300" height="44" rx="6" fill="#4C1D95"/>
  <text x="280" y="1336" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Claude API — MCP Dynamic Healing</text>
  <text x="280" y="1352" text-anchor="middle" fill="#DDD6FE" font-size="10">claude-haiku · page body → CSS/XPATH response · cached</text>

  <!-- H3 → right to S10 -->
  <path d="M 430 1340 H 500" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- S10 -->
  <rect x="502" y="1148" width="280" height="70" rx="6" fill="#fff" stroke="#64748B" stroke-width="1.5"/>
  <text x="642" y="1168" text-anchor="middle" fill="#1F2937" font-size="11" font-weight="bold">WebDriverWaitUtils</text>
  <text x="642" y="1184" text-anchor="middle" fill="#6B7280" font-size="10">waitForVisible / waitForClickable</text>
  <text x="642" y="1200" text-anchor="middle" fill="#6B7280" font-size="10">waitForVisibleWithFallback / withMcpHealing</text>
  <text x="642" y="1216" text-anchor="middle" fill="#6B7280" font-size="10">waitForClickableWithStaleRecovery</text>

  <!-- S10 → S11 (exit self-healing box) -->
  <line x1="642" y1="1218" x2="642" y2="1336" stroke="#6B7280" stroke-width="1.5" fill="none"/>
  <path d="M 642 1336 H 590" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- S11 -->
  <rect x="340" y="1352" width="260" height="44" rx="6" fill="#fff" stroke="#64748B" stroke-width="1.5"/>
  <text x="480" y="1370" text-anchor="middle" fill="#1F2937" font-size="11" font-weight="bold">ActionUtils</text>
  <text x="480" y="1386" text-anchor="middle" fill="#6B7280" font-size="10">clearAndType · jsClick · scrollToElement · pause</text>

  <line x1="480" y1="1396" x2="480" y2="1416" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- S12 -->
  <rect x="350" y="1418" width="260" height="44" rx="6" fill="#fff" stroke="#64748B" stroke-width="1.5"/>
  <text x="480" y="1436" text-anchor="middle" fill="#1F2937" font-size="11" font-weight="bold">Browser interaction</text>
  <text x="480" y="1452" text-anchor="middle" fill="#6B7280" font-size="10">click · type · navigate · assert DOM state</text>

  <line x1="480" y1="1462" x2="480" y2="1482" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- S13 diamond -->
  <polygon points="480,1484 590,1520 480,1556 370,1520" fill="#FFF3E0" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="480" y="1516" text-anchor="middle" fill="#78350F" font-size="11" font-weight="bold">Assertion</text>
  <text x="480" y="1532" text-anchor="middle" fill="#78350F" font-size="10">TestNG assert / assertTrue / assertEquals</text>

  <!-- pass → S14 left -->
  <path d="M 370 1520 H 240" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="310" y="1512" text-anchor="middle" fill="#16A34A" font-size="10" font-weight="bold">pass</text>

  <!-- PASS box -->
  <rect x="120" y="1542" width="240" height="44" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="240" y="1560" text-anchor="middle" fill="#166534" font-size="11" font-weight="bold">PASS logged</text>
  <text x="240" y="1576" text-anchor="middle" fill="#166534" font-size="10">TestListener · Allure.step → success</text>
  <path d="M 240 1520 V 1542" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- fail → S15 right -->
  <path d="M 590 1520 H 700" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="642" y="1512" text-anchor="middle" fill="#DC2626" font-size="10" font-weight="bold">fail</text>

  <!-- S15 diamond -->
  <polygon points="790,1522 900,1556 790,1590 680,1556" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="790" y="1548" text-anchor="middle" fill="#7F1D1D" font-size="10" font-weight="bold">Smoke test?</text>
  <text x="790" y="1562" text-anchor="middle" fill="#7F1D1D" font-size="10">RetryAnalyzer</text>
  <text x="790" y="1576" text-anchor="middle" fill="#7F1D1D" font-size="9">(max 2 retries)</text>

  <!-- no → S17 down -->
  <path d="M 790 1590 V 1640" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="804" y="1618" fill="#6B7280" font-size="10">no</text>

  <!-- exhausted → S17 down (same path) already handled -->

  <!-- retries left → S18 left then up -->
  <path d="M 680 1556 H 580 V 1640" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="626" y="1548" text-anchor="middle" fill="#D97706" font-size="10" font-weight="bold">retries left</text>

  <!-- S18 -->
  <rect x="460" y="1642" width="240" height="44" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="580" y="1660" text-anchor="middle" fill="#78350F" font-size="11" font-weight="bold">Wait back-off</text>
  <text x="580" y="1676" text-anchor="middle" fill="#78350F" font-size="10">1 s (retry 1) · 2 s (retry 2)</text>

  <!-- S18 → back up to S8 -->
  <path d="M 460 1664 H 80 V 996 H 350" stroke="#D97706" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#a)"/>
  <text x="62" y="1340" fill="#D97706" font-size="10" transform="rotate(-90,62,1340)">retry → re-enter test method</text>

  <!-- S17 -->
  <rect x="660" y="1642" width="260" height="44" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="790" y="1660" text-anchor="middle" fill="#7F1D1D" font-size="11" font-weight="bold">AllureListener</text>
  <text x="790" y="1676" text-anchor="middle" fill="#7F1D1D" font-size="10">screenshot · URL · page title · stack trace</text>

  <!-- S14 → S16, S17 → S16 -->
  <path d="M 240 1586 V 1760 H 360" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M 790 1686 V 1760 H 620" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- S16 -->
  <rect x="360" y="1762" width="260" height="50" rx="6" fill="#fff" stroke="#64748B" stroke-width="1.5"/>
  <text x="480" y="1782" text-anchor="middle" fill="#1F2937" font-size="11" font-weight="bold">@AfterMethod tearDown</text>
  <text x="480" y="1798" text-anchor="middle" fill="#6B7280" font-size="10">driver.quit() · ThreadLocal.remove()</text>
  <text x="480" y="1812" text-anchor="middle" fill="#6B7280" font-size="10">Allure result JSON written</text>

  <!-- ── OUTPUT ── -->
  <line x1="480" y1="1882" x2="480" y2="1900" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- R1 cylinder -->
  <rect x="340" y="1902" width="280" height="44" rx="6" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1.5"/>
  <ellipse cx="480" cy="1902" rx="140" ry="12" fill="#C5CAE9" stroke="#3F51B5" stroke-width="1.5"/>
  <text x="480" y="1930" text-anchor="middle" fill="#1A237E" font-size="11" font-weight="bold">target/allure-results/</text>
  <text x="480" y="1944" text-anchor="middle" fill="#3F51B5" font-size="10">raw JSON + failure screenshots</text>

  <line x1="480" y1="1958" x2="480" y2="1978" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- R2 -->
  <rect x="310" y="1980" width="340" height="44" rx="6" fill="#fff" stroke="#64748B" stroke-width="1.5"/>
  <text x="480" y="1998" text-anchor="middle" fill="#1F2937" font-size="11" font-weight="bold">mvn allure:serve</text>
  <text x="480" y="2014" text-anchor="middle" fill="#6B7280" font-size="10">or Jenkins Allure plugin (post-build action)</text>

  <line x1="480" y1="2024" x2="480" y2="2044" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- R3 pill -->
  <rect x="290" y="2046" width="380" height="44" rx="22" fill="#2196F3"/>
  <text x="480" y="2064" text-anchor="middle" fill="white" font-size="12" font-weight="bold">HTML Report in browser</text>
  <text x="480" y="2080" text-anchor="middle" fill="#BBDEFB" font-size="10">Overview · Suites · Behaviors · Timeline · Graphs</text>

  <!-- S16 bottom → out of subgraph -->
  <line x1="480" y1="1812" x2="480" y2="1878" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
</svg>
