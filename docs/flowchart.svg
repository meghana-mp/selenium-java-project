  <text x="480" y="498" text-anchor="middle" fill="#BBDEFB" font-size="10">thread-count=2</text>

  <!-- T1 / T2 -->
  <path d="M 480 506 V 526 H 230" stroke="#6B7280" stroke-width="1.5" fill="none"/>
  <line x1="230" y1="526" x2="230" y2="546" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M 480 506 V 526 H 730" stroke="#6B7280" stroke-width="1.5" fill="none"/>
  <line x1="730" y1="526" x2="730" y2="546" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="155" y="548" width="150" height="36" rx="6" fill="#3949AB"/>
  <text x="230" y="568" text-anchor="middle" fill="white" font-size="11">Thread 1</text>
  <rect x="655" y="548" width="150" height="36" rx="6" fill="#3949AB"/>
  <text x="730" y="568" text-anchor="middle" fill="white" font-size="11">Thread 2</text>

  <!-- Threads into subgraph -->
  <path d="M 230 584 V 620 H 370" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M 730 584 V 620 H 610" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- ── PER THREAD SUBGRAPH ──────────────────────────────── -->
  <rect x="20" y="600" width="920" height="1280" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="480" y="622" text-anchor="middle" fill="#475569" font-size="11" font-weight="bold" letter-spacing="1">PER THREAD — IDENTICAL FLOW</text>

  <!-- S1 -->
  <rect x="360" y="630" width="240" height="44" rx="6" fill="#fff" stroke="#64748B" stroke-width="1.5"/>
  <text x="480" y="648" text-anchor="middle" fill="#1F2937" font-size="11" font-weight="bold">@BeforeMethod setUp</text>
  <text x="480" y="664" text-anchor="middle" fill="#6B7280" font-size="10">BrowserFactory.initDriver(browser)</text>

  <line x1="480" y1="674" x2="480" y2="694" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- S3 diamond -->
  <polygon points="480,696 610,730 480,764 350,730" fill="#FFF9C4" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="480" y="726" text-anchor="middle" fill="#78350F" font-size="10" font-weight="bold">SELENIUM_REMOTE_URL</text>
  <text x="480" y="742" text-anchor="middle" fill="#78350F" font-size="10">set or not set?</text>

  <!-- S4 left -->
  <path d="M 350 730 H 190" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="270" y="722" text-anchor="middle" fill="#6B7280" font-size="10">not set</text>
  <rect x="80" y="752" width="220" height="44" rx="6" fill="#fff" stroke="#64748B" stroke-width="1.5"/>
  <text x="190" y="770" text-anchor="middle" fill="#1F2937" font-size="11" font-weight="bold">Local ChromeDriver</text>
  <text x="190" y="786" text-anchor="middle" fill="#6B7280" font-size="10">WebDriverManager auto-config</text>

  <!-- S5 right -->
  <path d="M 610 730 H 770" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="690" y="722" text-anchor="middle" fill="#6B7280" font-size="10">set</text>
  <rect x="660" y="752" width="220" height="44" rx="6" fill="#fff" stroke="#64748B" stroke-width="1.5"/>
  <text x="770" y="770" text-anchor="middle" fill="#1F2937" font-size="11" font-weight="bold">RemoteWebDriver</text>
  <text x="770" y="786" text-anchor="middle" fill="#6B7280" font-size="10">Selenium Grid — docker service</text>

  <!-- S4/S5 → S6 converge -->
  <path d="M 190 796 V 840 H 370" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M 770 796 V 840 H 590" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- S6 -->
  <rect x="370" y="842" width="220" height="44" rx="6" fill="#fff" stroke="#64748B" stroke-width="1.5"/>
  <text x="480" y="860" text-anchor="middle" fill="#1F2937" font-size="11" font-weight="bold">driver.get(baseUrl)</text>
  <text x="480" y="876" text-anchor="middle" fill="#6B7280" font-size="10">navigate to app.base.url from ConfigManager</text>

  <line x1="480" y1="886" x2="480" y2="906" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

