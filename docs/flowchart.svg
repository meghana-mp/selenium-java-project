  <path d="M 110 64 V 320 H 280" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <!-- DOCKER → MVN -->
  <line x1="480" y1="64" x2="480" y2="320" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- JCI → MVN -->
  <path d="M 820 262 V 345 H 680" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- MVN -->
  <rect x="280" y="322" width="400" height="50" rx="6" fill="#1565C0"/>
  <text x="480" y="343" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Maven Surefire</text>
  <text x="480" y="361" text-anchor="middle" fill="#BBDEFB" font-size="10">reads testng-suite.xml — suite param: smoke / regression / full</text>

  <line x1="480" y1="372" x2="480" y2="392" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

