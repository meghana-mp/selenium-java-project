  <line x1="820" y1="196" x2="820" y2="216" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="690" y="218" width="260" height="44" rx="6" fill="#fff" stroke="#D24939" stroke-width="1.5"/>
  <text x="820" y="236" text-anchor="middle" fill="#1F2937" font-size="11" font-weight="bold">docker compose up</text>
  <text x="820" y="252" text-anchor="middle" fill="#6B7280" font-size="10">-f docker-compose.yml (ARM64 Chromium)</text>

  <!-- Converge lines → MVN -->
